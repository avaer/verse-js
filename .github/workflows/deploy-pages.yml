name: Deploy to GitHub Pages

# Publishes the static export to the gh-pages branch. Branch-based Pages
# needs no repo-settings step: GitHub auto-enables Pages when a gh-pages
# branch exists (and the workflow token only needs contents: write —
# unlike the "GitHub Actions" Pages source, whose site-creation API is
# not accessible to workflow tokens).

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static export (basePath /verse-js)
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Push export to gh-pages
        run: |
          cd out
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
